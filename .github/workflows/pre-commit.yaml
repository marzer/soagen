name: pre-commit

on:
    pull_request:
        branches:
            - "main"
    workflow_dispatch:

concurrency:
    group: ${{ github.workflow }}-${{ github.ref }}
    cancel-in-progress: true

jobs:
    pre-commit:
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v7
            - uses: actions/setup-python@v7
              with:
                  python-version: "3.13"
            - uses: pre-commit/action@v3.0.1
