name: ci

on:
    push:
        paths:
            - "**.py"
            - "**.hpp"
            - "**.cpp"
            - "**.inl"
            - "**.toml"
            - "**.natvis"
            - "**/meson.build"
            - "meson_options.txt"
            - "pyproject.toml"
            - "VERSION"
            - "**/workflows/**.yaml"
        branches:
            - "**"
        tags-ignore:
            - "**"
    pull_request:
        paths:
            - "**.py"
            - "**.hpp"
            - "**.cpp"
            - "**.inl"
            - "**.toml"
            - "**.natvis"
            - "**/meson.build"
            - "meson_options.txt"
            - "pyproject.toml"
            - "VERSION"
            - "**/workflows/**.yaml"
    workflow_dispatch:

concurrency:
    group: ${{ github.workflow }}-${{ github.ref }}
    cancel-in-progress: true

jobs:
    # NOTE: clang-format (C++) + ruff (python) formatting/lint runs in the separate pre-commit.yaml workflow.

    # static type checking (pyright)
    typecheck:
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v7
            - uses: actions/setup-python@v5
              with:
                  python-version: "3.13"
            - uses: actions/setup-node@v4
              with:
                  node-version: "20"
            - name: Install dev deps
              run: |
                  python -m pip install --upgrade pip
                  python -m pip install '.[dev]'
            - name: pyright
              run: python -m pyright

    # unit tests for the pure python helpers + config validation
    unit:
        strategy:
            fail-fast: false
            matrix:
                python:
                    - "3.9"
                    - "3.10"
                    - "3.11"
                    - "3.12"
                    - "3.13"
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v7
            - uses: actions/setup-python@v5
              with:
                  python-version: "${{ matrix.python }}"
            - name: Install soagen
              run: |
                  python -m pip install --upgrade pip
                  python -m pip install --upgrade '.[test]'
            - name: Run unit tests
              run: python -m pytest tests/python -ra

    # end-to-end smoke
    generator:
        runs-on: ubuntu-latest
        defaults:
            run:
                shell: bash
        steps:
            - uses: actions/checkout@v7
            - uses: actions/setup-python@v5
              with:
                  python-version: "3.13"
            - name: Install clang-format
              run: |
                  sudo apt -y update
                  sudo apt -y install --no-install-recommends clang-format
            - name: Install soagen
              run: |
                  python -m pip install --upgrade pip
                  python -m pip install -e .
            - name: Regenerate examples + tests (must not crash)
              run: |
                  ( cd examples && soagen '*.toml' --doxygen )
                  ( cd tests/cpp && soagen '*.toml' --no-doxygen )
            - name: Amalgam must be up to date
              run: |
                  soagen --update-hpp
                  git diff --exit-code -- src/soagen/hpp/single/soagen.hpp

    # C++ runtime library: build + run the Catch2 suite on linux (clang + gcc, debug + release)
    linux:
        strategy:
            fail-fast: false
            matrix:
                compiler:
                    - "clang"
                    - "gcc"
                type:
                    - "debug"
                    - "release"
        runs-on: ubuntu-latest
        defaults:
            run:
                shell: bash
        steps:
            - uses: actions/checkout@v7

            - name: Install dependencies
              run: |
                  sudo apt -y update
                  sudo apt -y install --no-install-recommends git python3 python3-pip ninja-build lld
                  sudo -H pip3 install --no-cache-dir --upgrade meson
                  sudo -H pip3 install --no-cache-dir .
                  sudo rm -rf build

            - name: Install clang
              if: ${{ startsWith(matrix.compiler, 'clang') }}
              run: |
                  sudo apt -y install --no-install-recommends clang
                  sudo update-alternatives --install /usr/bin/c++ c++ /usr/bin/clang++ 1000
                  sudo update-alternatives --install /usr/bin/cc cc /usr/bin/clang 1000

            - name: Install gcc
              if: ${{ startsWith(matrix.compiler, 'gcc') }}
              run: |
                  sudo apt -y install --no-install-recommends gcc g++
                  sudo update-alternatives --install /usr/bin/c++ c++ /usr/bin/g++ 1000
                  sudo update-alternatives --install /usr/bin/cc cc /usr/bin/gcc 1000

            - name: Configure Meson
              run: |
                  if [ ${{ matrix.compiler }} = gcc ]; then pch=false; else pch=true; fi
                  CC=cc CXX=c++ CXX_LD=lld meson setup build --buildtype=${{ matrix.type }} -Dpedantic=true -Dbuild_tests=true -Dbuild_examples=true -Db_pch=$pch

            - name: Build
              run: meson compile -C build --jobs -1

            - name: Test
              run: meson test -C build --verbose

    # C++ coverage
    coverage:
        runs-on: ubuntu-latest
        defaults:
            run:
                shell: bash
        steps:
            - uses: actions/checkout@v7

            - name: Install dependencies
              run: |
                  sudo apt -y update
                  sudo apt -y install --no-install-recommends git python3 python3-pip ninja-build lld clang llvm
                  sudo -H pip3 install --no-cache-dir --upgrade meson
                  sudo -H pip3 install --no-cache-dir .
                  sudo rm -rf build
                  sudo update-alternatives --install /usr/bin/c++ c++ /usr/bin/clang++ 1000
                  sudo update-alternatives --install /usr/bin/cc cc /usr/bin/clang 1000

            - name: Configure Meson
              run: CC=cc CXX=c++ CXX_LD=lld meson setup build -Dcoverage=enabled -Dbuildtype=debug -Dbuild_tests=true

            - name: Build
              run: meson compile -C build --jobs -1

            - name: Coverage report + floor gate
              env:
                  SOAGEN_COVERAGE_MIN_LINES: "88"
                  SOAGEN_COVERAGE_MIN_FUNCTIONS: "95"
                  SOAGEN_COVERAGE_MIN_REGIONS: "85"
              run: meson compile -C build coverage-report

            - name: Upload HTML report
              if: always()
              uses: actions/upload-artifact@v7
              with:
                  name: coverage-html
                  path: build/tests/cpp/coverage/html
                  if-no-files-found: warn

    # C++ runtime library
    windows:
        strategy:
            fail-fast: false
            matrix:
                type:
                    - "debug"
                    - "release"
        runs-on: windows-latest
        defaults:
            run:
                shell: cmd
        steps:
            - uses: actions/checkout@v7

            - name: Install dependencies
              run: |
                  python3 -m pip install --upgrade pip
                  pip3 install --no-cache-dir --upgrade meson ninja
                  pip3 install --no-cache-dir .

            - uses: ilammy/msvc-dev-cmd@v1

            - name: Configure Meson
              run: meson setup build --vsenv --buildtype=${{ matrix.type }} -Dpedantic=true -Dbuild_tests=true

            - name: Build
              run: meson compile -C build --jobs -1

            - name: Test
              run: meson test -C build --verbose

    # C++ runtime library: verify the headers + strong-guarantee rollback machinery
    no-exceptions:
        strategy:
            fail-fast: false
            matrix:
                compiler:
                    - "clang"
                    - "gcc"
        runs-on: ubuntu-latest
        defaults:
            run:
                shell: bash
        steps:
            - uses: actions/checkout@v7

            - name: Install dependencies
              run: |
                  sudo apt -y update
                  sudo apt -y install --no-install-recommends git python3 python3-pip ninja-build lld
                  sudo -H pip3 install --no-cache-dir --upgrade meson
                  sudo -H pip3 install --no-cache-dir .
                  sudo rm -rf build

            - name: Install clang
              if: ${{ matrix.compiler == 'clang' }}
              run: |
                  sudo apt -y install --no-install-recommends clang
                  sudo update-alternatives --install /usr/bin/c++ c++ /usr/bin/clang++ 1000
                  sudo update-alternatives --install /usr/bin/cc cc /usr/bin/clang 1000

            - name: Install gcc
              if: ${{ matrix.compiler == 'gcc' }}
              run: |
                  sudo apt -y install --no-install-recommends gcc g++
                  sudo update-alternatives --install /usr/bin/c++ c++ /usr/bin/g++ 1000
                  sudo update-alternatives --install /usr/bin/cc cc /usr/bin/gcc 1000

            - name: Configure Meson
              run: CC=cc CXX=c++ CXX_LD=lld meson setup build -Dcpp_eh=none -Dbuild_tests=true -Dbuild_examples=false -Dpedantic=true

            - name: Build
              run: meson compile -C build --jobs -1

            - name: Test
              run: meson test -C build --verbose

    # same, on msvc (exercises the _HAS_EXCEPTIONS=0 path through the MS STL)
    windows-no-exceptions:
        runs-on: windows-latest
        defaults:
            run:
                shell: cmd
        steps:
            - uses: actions/checkout@v7

            - name: Install dependencies
              run: |
                  python3 -m pip install --upgrade pip
                  pip3 install --no-cache-dir --upgrade meson ninja
                  pip3 install --no-cache-dir .

            - uses: ilammy/msvc-dev-cmd@v1

            - name: Configure Meson
              run: meson setup build --vsenv -Dcpp_eh=none -Dpedantic=true -Dbuild_tests=true

            - name: Build
              run: meson compile -C build --jobs -1

            - name: Test
              run: meson test -C build --verbose

    # lint the workflow files + their embedded shell (catches release-script bugs before they misfire)
    actionlint:
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v7
            - name: Download actionlint
              id: actionlint
              run: bash <(curl -fsSL https://raw.githubusercontent.com/rhysd/actionlint/main/scripts/download-actionlint.bash)
            - name: Lint workflows
              run: ${{ steps.actionlint.outputs.executable }} -color

    # build the distribution and install the wheel into a clean venv to validate the packaging path
    # end-to-end: setuptools' dynamic version (from VERSION), the entry-point script, and version.py's
    # importlib.metadata fallback (the source tree never hits that branch, since VERSION always wins there).
    package:
        runs-on: ubuntu-latest
        defaults:
            run:
                shell: bash
        steps:
            - uses: actions/checkout@v7
            - uses: actions/setup-python@v5
              with:
                  python-version: "3.13"
            - name: Build sdist + wheel
              run: |
                  python -m pip install --upgrade pip build
                  python -m build
            - name: Install wheel into a clean venv and verify version
              run: |
                  python -m venv /tmp/venv
                  /tmp/venv/bin/pip install dist/*.whl
                  expected="$(tr -d '[:space:]' < VERSION)"
                  actual="$(/tmp/venv/bin/soagen --version)"
                  echo "expected='$expected' actual='$actual'"
                  test "$actual" = "$expected"

    # on a push to main, cut a release from VERSION once everything above is green. the release is created
    # under a PAT (not the default GITHUB_TOKEN) so the tag it pushes triggers publish.yaml -> PyPI.
    # idempotent: if a release for the current VERSION already exists it no-ops, so it's safe on every push.
    release:
        needs:
            [
                typecheck,
                unit,
                generator,
                linux,
                coverage,
                windows,
                no-exceptions,
                windows-no-exceptions,
                actionlint,
                package,
            ]
        if: github.ref == 'refs/heads/main'
        runs-on: ubuntu-latest
        defaults:
            run:
                shell: bash
        steps:
            - name: Checkout
              uses: actions/checkout@v7

            - name: Create release from VERSION
              env:
                  # PAT (not the default GITHUB_TOKEN) so the tag this pushes triggers publish.yaml
                  GH_TOKEN: ${{ secrets.RELEASE_TOKEN }}
              run: |
                  shopt -s extglob
                  version=$(<VERSION)
                  version="${version##+([[:space:]])}"
                  version="${version%%+([[:space:]])}"
                  echo "VERSION: $version"

                  if [ -z "$version" ] || [ "$version" = "0.0.0" ]; then
                    echo "empty or 0.0.0 VERSION; nothing to do."
                    exit 0
                  fi

                  tag="v$version"
                  if gh release view "$tag" --repo "${{ github.repository }}" ; then
                    echo "release with tag $tag already exists; nothing to do."
                    exit 0
                  fi

                  notes="This release was triggered automatically by a merge to \`${{ github.ref_name }}\`."
                  notes+='<br/><br/>'
                  if [ -f "CHANGELOG.md" ]; then
                    notes+='See [CHANGELOG.md]('
                    notes+="https://github.com/${{ github.repository }}/blob/$tag/CHANGELOG.md"
                    notes+=') for a human-friendly change log. :tada:'
                  fi

                  gh release create "$tag" \
                    --repo "${{ github.repository }}" \
                    --target "${{ github.sha }}" \
                    --title "$tag" \
                    --generate-notes \
                    --notes "$notes"
