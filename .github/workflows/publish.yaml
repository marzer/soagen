name: publish

# publishes to PyPI on version tag push, via trusted publishing (OIDC - no API token needed).
# one-time setup on PyPI: add a trusted publisher for this repo + this workflow + the 'pypi' environment.
# https://docs.pypi.org/trusted-publishers/

on:
    push:
        tags:
            - "v*"
    workflow_dispatch:

permissions:
    contents: read

jobs:
    build:
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v7
            - uses: actions/setup-python@v6
              with:
                  python-version: "3.13"
            - name: Install build + test deps
              run: |
                  python -m pip install --upgrade pip build
                  python -m pip install '.[test]'
            - name: Unit tests
              run: python -m pytest tests/python -ra
            - name: Build sdist + wheel
              run: python -m build
            - uses: actions/upload-artifact@v7
              with:
                  name: dist
                  path: dist/

    publish:
        needs: build
        runs-on: ubuntu-latest
        environment:
            name: pypi
            url: https://pypi.org/p/soagen
        permissions:
            id-token: write # trusted publishing (OIDC)
        steps:
            - uses: actions/download-artifact@v8
              with:
                  name: dist
                  path: dist/
            - uses: pypa/gh-action-pypi-publish@release/v1
