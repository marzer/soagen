name: docs

on:
    push:
        branches:
            - main
        paths:
            - "**.hpp"
            - "**.dox"
            - "**.md"
            - "docs/**"
            - "**/docs.yaml"
    workflow_dispatch:

permissions:
    contents: read
    pages: write
    id-token: write

concurrency:
    group: ${{ github.workflow }}
    cancel-in-progress: true

jobs:
    docs:
        environment:
            name: github-pages
            url: ${{ steps.deployment.outputs.page_url }}

        runs-on: ubuntu-latest

        defaults:
            run:
                shell: bash

        steps:
            - uses: actions/checkout@v7

            - name: Install Doxygen
              uses: ssciwr/doxygen-install@v2
              with:
                  version: "1.13.2"

            - name: Install dependencies
              run: |
                  sudo apt -y update
                  sudo apt -y install --no-install-recommends git python3 python3-pip doxygen
                  sudo -H pip3 install --upgrade poxy
                  poxy --version
                  poxy --where
                  doxygen --version

            - name: Generate docs
              run: |
                  cd docs
                  poxy --verbose

            - name: Setup Pages
              uses: actions/configure-pages@v6

            - name: Upload
              uses: actions/upload-pages-artifact@v5
              with:
                  path: "./docs/html"

            - name: Deploy
              id: deployment
              uses: actions/deploy-pages@v5
